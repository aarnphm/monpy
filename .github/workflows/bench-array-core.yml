name: Benchmark Sweep

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  arrays:
    name: bench array core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    # Per-OS concurrency group so a Linux re-run doesn't cancel an in-flight
    # macOS run (and vice versa). `matrix.os` is only addressable inside the
    # job, not at workflow level, so concurrency lives here.
    concurrency:
      group: monpy-bench-${{ github.ref }}-${{ matrix.os }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        # Two host OSes so the benchmark validates both Apple Accelerate
        # (macos-15) and OpenBLAS / LAPACK (ubuntu-latest) BLAS backends.
        # Same source, same kernels — only the dylib path differs at link
        # time (resolved by `accelerate.mojo`'s comptime branches).
        include:
          - os: macos-15
            mojo_flags: ""
            comment_key: arm
            comment_title: monpy benchmark sweep (ARM)
          - os: ubuntu-latest
            mojo_flags: "--target-cpu=x86-64"
            comment_key: ubuntu
            comment_title: monpy benchmark sweep (Ubuntu)
    env:
      BENCH_LOOPS: "200"
      BENCH_REPEATS: "5"
      BENCH_ROUNDS: "3"
      MOHAUS_MOJO: ${{ github.workspace }}/.venv/bin/mojo

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install Linux BLAS / LAPACK
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          # OpenBLAS provides cblas + lapack in a single dylib at
          # libopenblas.so.0; the dev package adds the unversioned symlink.
          # liblapack-dev is kept as a fallback path tried by accelerate.mojo
          # so distros that ship netlib LAPACK separately still work.
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libopenblas-dev \
            liblapack-dev

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install uv
        run: python -m pip install --upgrade uv

      - name: install nightly modular and monpy
        run: |
          set -euo pipefail

          python -m uv venv --python 3.11 --clear "$GITHUB_WORKSPACE/.venv"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          venv_python="$GITHUB_WORKSPACE/.venv/bin/python"

          python -m uv pip install \
            --python "$venv_python" \
            modular \
            --index-url https://whl.modular.com/nightly/simple/ \
            --extra-index-url https://pypi.org/simple \
            --prerelease allow

          "$GITHUB_WORKSPACE/.venv/bin/mojo" --version
          "$venv_python" .github/scripts/set-mojo-flags.py -- ${{ matrix.mojo_flags }}

          python -m uv pip install \
            --python "$venv_python" \
            mohaus \
            --index-url https://aarnphm.github.io/mohaus/simple \
            --extra-index-url https://pypi.org/simple

          python -m uv pip install \
            --python "$venv_python" \
            --reinstall-package monpy \
            --index-url https://whl.modular.com/nightly/simple/ \
            --extra-index-url https://aarnphm.github.io/mohaus/simple \
            --extra-index-url https://pypi.org/simple \
            --prerelease allow \
            -e ".[dev]"

      - name: smoke test (loads BLAS dylib)
        run: |
          set -euo pipefail
          # Cheap import-time check that catches missing OpenBLAS / Accelerate before the long-running benchmark.
          .venv/bin/python -c "
          import numpy as np, monumpy as mnp
          a = mnp.asarray(np.eye(8, dtype=np.float32).tolist(), dtype=mnp.float32)
          b = mnp.asarray(np.arange(8, dtype=np.float32).tolist(), dtype=mnp.float32)
          mat_a = mnp.asarray(np.eye(32, dtype=np.float32).tolist(), dtype=mnp.float32)
          mat = mat_a @ mat_a
          inv = mnp.linalg.inv(a)
          sol = mnp.linalg.solve(a, b)
          print('matmul.used_accelerate:', mat._native.used_accelerate())
          print('inv.used_accelerate:   ', inv._native.used_accelerate())
          print('solve.used_accelerate: ', sol._native.used_accelerate())
          assert mat._native.used_accelerate(), 'BLAS sgemm path did not fire'
          assert inv._native.used_accelerate(), 'LAPACK sgesv (inv) path did not fire'
          assert sol._native.used_accelerate(), 'LAPACK sgesv (solve) path did not fire'
          "

      - name: run benchmark sweep
        run: |
          set -euo pipefail

          benchmark_dir="results/$(date -u +%F)"
          monpy-bench \
            --format json \
            --no-progress \
            --no-stdout \
            --output-dir "$benchmark_dir" \
            --types all \
            --loops "$BENCH_LOOPS" \
            --repeats "$BENCH_REPEATS" \
            --rounds "$BENCH_ROUNDS"

          test -s "$benchmark_dir/results.json"
          test -s "$benchmark_dir/manifest.json"

      - name: post commit comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          benchmark_dir="results/$(date -u +%F)"
          post_args=(
            "$benchmark_dir/results.json" \
            --comment-key "${{ matrix.comment_key }}" \
            --comment-title "${{ matrix.comment_title }}" \
            --comment-output "benchmark-comment-${{ matrix.comment_key }}.md" \
            --post
          )
          .venv/bin/python .github/scripts/posts.py "${post_args[@]}"

      - name: upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monpy-bench-${{ matrix.os }}-${{ github.sha }}
          path: |
            results/**
            benchmark-comment-*.md
          if-no-files-found: ignore
